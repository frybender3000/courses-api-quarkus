quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

quarkus.http.port=8080

jwt.expiration.seconds=3600

mp.jwt.verify.issuer=courses-api-quarkus
mp.jwt.verify.publickey.location=publicKey.pem

smallrye.jwt.sign.key.location=jwt.jks
smallrye.jwt.keystore.password=123456
smallrye.jwt.keystore.sign.key.alias=jwtKey
smallrye.jwt.keystore.sign.key.password=123456

quarkus.smallrye-health.root-path=/q/health